<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Simple Site</title>
    <style>
        /* Base Styles */
        :root {
            --bg: #ffffff;
            --text: #333333;
            --accent: #007bff;
            --secondary: #f4f4f9;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            line-height: 1.6;
            color: var(--text);
            background-color: var(--bg);
        }

        /* Hero Section */
        header {
            height: 80vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 0 20px;
            position: relative;
            overflow: hidden;
            background: radial-gradient(circle, #d1ccff 0%, #A49FFF 100%);
        }

        /* Blurred Background Image */
        header::after {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('assets/images/game_preview.png');
            background-repeat: no-repeat;
            background-position: center center;
            background-size: contain;
            z-index: 0; /* behind overlay and text */
        }

        /* Dark overlay on top of image */
        header .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.35); /* darkens the image */
            z-index: 1; /* above image, below text */
        }

        /* Text container above overlay */
        header .text-container {
            position: relative;
            z-index: 2;
        }

        header h1 {
            font-size: 3.5rem;
            margin-bottom: 1rem;
            color: #fff;
        }

        header p {
            font-size: 1.2rem;
            color: #f0f0f0;
            max-width: 600px;
            margin: 0 auto;
        }

        /* Contact Section */
        section {
            padding: 100px 10%;
            text-align: center;
        }

        .section-title {
            margin-bottom: 30px;
            font-size: 2rem;
        }

        /* Footer */
        footer {
            text-align: center;
            padding: 40px;
            background: #333;
            color: white;
        }

        /* Responsive */
        @media (max-width: 768px) {
            header h1 { font-size: 2.5rem; }
            header::after {
                background-size: 80% contain;
            }
        }
    </style>
</head>
<body>

<header>
    <div class="overlay"></div>
    <div class="text-container">
        <h1>Summy</h1>
        <p style="font-size: 36px;">Quick number puzzle</p>
    </div>
</header>

<section id="contact">
    <h2 class="section-title">Get In Touch</h2>
    <p style="text-align: center;">Feel free to reach out via <a href="https://www.linkedin.com/in/mecofarid/" target="_blank">LinkedIn</a></p>
</section>

<footer>
    <p>&copy; <span id="year"></span> mecoFarid. Built with simplicity.</p>
</footer>

<script>
    document.getElementById('year').textContent = new Date().getFullYear();
</script>

</body>
</html>
